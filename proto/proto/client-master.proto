syntax = "proto3";
package client_master;

service Fs {
  rpc Create(CreateRequest) returns (CreateResponse);
}

message CreateRequest {
  string path = 1;
  bool is_directory = 2;
}

message CreateResponse {
  // TODO: Use more detail as failures occur
  enum Error {
    FILE_EXISTS = 0;
    INVALID_PATH = 1;
    OTHER = 2;
  }

  bool success = 1;
  optional Error error = 2;
}
