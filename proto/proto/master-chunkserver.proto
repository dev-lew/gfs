syntax = "proto3";
package master_chunkserver;

service HeartbeatService {
  rpc CollectStatus(CollectStatusRequest) returns (CollectStatusResponse);
}

message CollectStatusRequest {
  repeated uint64 available_chunks = 1;
}

message CollectStatusResponse {
  repeated uint64 deleted_chunks = 1;
  repeated uint64 leased_chunks = 2;
}
